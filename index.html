<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="description" content="Temporizador Pomodoro elegante con estadísticas y persistencia">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>FocusFlow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--gold:#D4A843;--gold-dim:#A8863A;--gold-glow:rgba(212,168,67,0.15);
--gold-bg:rgba(212,168,67,0.06);--bg:#0A0A0A;--bg2:#141414;--bg3:#1C1C1C;
--border:rgba(212,168,67,0.12);--text:#D4A843;--text-dim:#8C7235;--text-muted:#5A4A28;
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.header{padding:18px 20px 0;display:flex;align-items:center;justify-content:center;gap:8px}
.header-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold-glow)}
.header-title{font-size:17px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold)}
.body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 20px}
.page{display:none;flex-direction:column;align-items:center;gap:28px}
.page.active{display:flex}
.stats-page.active,.settings-page.active{align-items:stretch;max-width:380px;margin:0 auto;width:100%;gap:16px}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--bg2);border-radius:12px;padding:3px;width:100%;max-width:340px;border:0.5px solid var(--border)}
.tab{flex:1;padding:9px 4px;border:none;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:.3px;background:transparent;color:var(--text-muted);transition:all .25s}
.tab.active{background:var(--bg3);color:var(--gold);box-shadow:0 0 12px var(--gold-glow)}

/* Timer card */
.timer-card{background:linear-gradient(180deg,var(--bg2),var(--bg));border-radius:24px;padding:40px 24px 32px;width:100%;max-width:340px;position:relative;overflow:hidden;border:0.5px solid var(--border)}
.progress-bar{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width 1s linear}
.digital{text-align:center;font-family:'Courier New',Courier,monospace;font-size:clamp(60px,18vw,80px);font-weight:700;color:var(--gold);letter-spacing:-2px;line-height:1;text-shadow:0 0 30px var(--gold-glow)}
.digital .colon.blink{animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:.2}}
.mode-label{text-align:center;margin-top:12px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}
.dots{display:flex;justify-content:center;gap:12px;margin-top:16px}
.dot{width:8px;height:8px;border-radius:50%;transition:all .3s;background:rgba(90,74,40,0.25)}
.dot.filled{background:var(--gold);box-shadow:0 0 8px var(--gold-glow)}

/* Controls */
.controls{display:flex;align-items:center;gap:20px}
.btn-ctrl{width:50px;height:50px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:all .15s}
.btn-ctrl:active{transform:scale(.9)}
.btn-play{width:76px;height:76px;border-radius:50%;border:2px solid var(--gold);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gold);transition:transform .1s;box-shadow:0 0 32px var(--gold-glow),inset 0 0 24px var(--gold-glow)}
.btn-play:active{transform:scale(.93)}

/* Quick stats */
.quick-stats{display:flex;gap:10px;width:100%;max-width:340px}
.stat-card{flex:1;background:var(--bg2);border-radius:12px;padding:14px 8px;text-align:center;border:0.5px solid var(--border)}
.stat-label{font-size:10px;color:var(--text-muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.stat-value{font-size:24px;font-weight:700;color:var(--gold);font-family:'Courier New',monospace;text-shadow:0 0 12px var(--gold-glow)}

/* Stats page */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stats-card{background:var(--bg2);border-radius:12px;padding:16px;border:0.5px solid var(--border)}
.stats-card-label{font-size:11px;color:var(--text-muted);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stats-card-value{font-size:26px;font-weight:700;color:var(--gold);font-family:'Courier New',monospace;text-shadow:0 0 12px var(--gold-glow)}
.chart-box{background:var(--bg2);border-radius:12px;padding:18px 20px;border:0.5px solid var(--border)}
.chart-title{font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:18px;text-transform:uppercase;letter-spacing:1px}
.chart{display:flex;align-items:flex-end;gap:8px;height:100px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.chart-num{font-size:11px;font-weight:700;color:var(--gold);font-family:monospace}
.chart-bar{width:100%;max-width:28px;border-radius:4px 4px 2px 2px;transition:height .4s ease;min-height:4px}
.chart-day{font-size:10px;color:var(--text-muted);font-weight:400}
.chart-day.today{color:var(--gold);font-weight:700}
.streak-msg{display:flex;align-items:center;gap:8px;background:var(--gold-bg);border-radius:12px;padding:12px 16px;border:0.5px solid var(--border);font-size:13px;color:var(--text-dim)}

/* Settings */
.settings-section{background:var(--bg2);border-radius:12px;padding:4px 18px;border:0.5px solid var(--border)}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.setting-row+.setting-row{border-top:0.5px solid var(--border)}
.setting-label{font-size:14px;color:var(--gold)}
.setting-controls{display:flex;align-items:center;gap:12px}
.btn-step{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:16px;color:var(--text-dim);display:flex;align-items:center;justify-content:center}
.btn-step:active{transform:scale(.9)}
.setting-val{font-size:18px;font-weight:700;font-family:monospace;min-width:28px;text-align:center;color:var(--gold)}
.setting-unit{font-size:11px;color:var(--text-muted);min-width:24px}
.btn-danger{width:100%;padding:14px 0;border:none;background:none;cursor:pointer;font-size:14px;color:#E24B4A;text-align:left;font-weight:500}
.footer-text{font-size:11px;color:var(--text-muted);text-align:center;margin:8px 0 0;letter-spacing:.5px}

/* Nav */
.nav{display:flex;border-top:0.5px solid var(--border);background:var(--bg2);padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:12px 0 14px;border:none;background:none;cursor:pointer;color:var(--text-muted);transition:color .2s;font-size:10px;font-weight:600;letter-spacing:.5px}
.nav-btn.active{color:var(--gold)}
.nav-btn svg{width:22px;height:22px}

h2{font-size:20px;font-weight:700;color:var(--gold);margin:0;letter-spacing:-.5px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-dot"></div>
    <span class="header-title">FocusFlow</span>
  </div>

  <div class="body">
    <!-- TIMER PAGE -->
    <div id="page-timer" class="page active">
      <div class="tabs">
        <button class="tab active" data-mode="work">Enfoque</button>
        <button class="tab" data-mode="short">Descanso</button>
        <button class="tab" data-mode="long">Descanso largo</button>
      </div>
      <div class="timer-card">
        <div class="progress-bar" id="progress"></div>
        <div class="digital" id="display">25:00</div>
        <div class="mode-label" id="mode-label">Enfoque</div>
        <div class="dots" id="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
      <div class="controls">
        <button class="btn-ctrl" id="btn-reset" aria-label="Reset">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12a9 9 0 1 1 3 6.9"/><path d="M3 21V12H12"/></svg>
        </button>
        <button class="btn-play" id="btn-play" aria-label="Play">
          <svg id="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </button>
        <button class="btn-ctrl" id="btn-skip" aria-label="Skip">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
      </div>
      <div class="quick-stats">
        <div class="stat-card"><div class="stat-label">Hoy</div><div class="stat-value" id="s-today">0</div></div>
        <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="s-total">0</div></div>
        <div class="stat-card"><div class="stat-label">Racha</div><div class="stat-value" id="s-streak">0d</div></div>
      </div>
    </div>

    <!-- STATS PAGE -->
    <div id="page-stats" class="page stats-page">
      <h2>Estadisticas</h2>
      <div class="stats-grid">
        <div class="stats-card"><div class="stats-card-label">Pomodoros hoy</div><div class="stats-card-value" id="st-today">0</div></div>
        <div class="stats-card"><div class="stats-card-label">Racha actual</div><div class="stats-card-value" id="st-streak">0 dias</div></div>
        <div class="stats-card"><div class="stats-card-label">Total pomodoros</div><div class="stats-card-value" id="st-total">0</div></div>
        <div class="stats-card"><div class="stats-card-label">Horas de enfoque</div><div class="stats-card-value" id="st-hours">0h</div></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">Ultimos 7 dias</div>
        <div class="chart" id="chart"></div>
      </div>
      <div class="streak-msg" id="streak-msg" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#D4A843" stroke-width="2" stroke-linecap="round"><path d="M12 12c2-2.96 0-7-1-8 0 3.038-1.773 4.741-3 6-1.226 1.26-2 3.24-2 5a6 6 0 1 0 12 0c0-1.532-1.056-3.94-2-5-1.786 3-2.791 3-4 2z"/></svg>
        <span id="streak-text"></span>
      </div>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="page-settings" class="page settings-page">
      <h2>Ajustes</h2>
      <div class="settings-section">
        <div class="setting-row">
          <span class="setting-label">Enfoque</span>
          <div class="setting-controls">
            <button class="btn-step" onclick="changeSetting('work',-1)">-</button>
            <span class="setting-val" id="set-work">25</span>
            <button class="btn-step" onclick="changeSetting('work',1)">+</button>
            <span class="setting-unit">min</span>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Descanso corto</span>
          <div class="setting-controls">
            <button class="btn-step" onclick="changeSetting('short',-1)">-</button>
            <span class="setting-val" id="set-short">5</span>
            <button class="btn-step" onclick="changeSetting('short',1)">+</button>
            <span class="setting-unit">min</span>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Descanso largo</span>
          <div class="setting-controls">
            <button class="btn-step" onclick="changeSetting('long',-1)">-</button>
            <span class="setting-val" id="set-long">15</span>
            <button class="btn-step" onclick="changeSetting('long',1)">+</button>
            <span class="setting-unit">min</span>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <button class="btn-danger" onclick="resetAllData()">Reiniciar todos los datos</button>
      </div>
      <p class="footer-text">FocusFlow v2.0</p>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" data-page="timer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3l2 2"/><path d="M19 3l-2 2"/><path d="M12 3v2"/></svg>
      <span>Timer</span>
    </button>
    <button class="nav-btn" data-page="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="12" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="12" rx="1"/><rect x="17" y="4" width="4" height="16" rx="1"/></svg>
      <span>Stats</span>
    </button>
    <button class="nav-btn" data-page="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span>Ajustes</span>
    </button>
  </div>
</div>

<script>
const STORE_KEY = "focusflow-data";
const MODES = { work:{label:"Enfoque",duration:25}, short:{label:"Descanso",duration:5}, long:{label:"Descanso largo",duration:15} };

let state = { mode:"work", timeLeft:25*60, running:false, pomCount:0, interval:null };
let settings = { work:25, short:5, long:15 };
let data = { history:{}, totalPomodoros:0, totalMinutes:0 };
let audioCtx = null;

// Storage
function loadStore(){ try{ const d=localStorage.getItem(STORE_KEY); if(d) data=JSON.parse(d); } catch(e){} }
function saveStore(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e){} }
function getToday(){ return new Date().toISOString().slice(0,10); }
function pad(n){ return String(n).padStart(2,"0"); }

function calcStreak(){
  let s=0, d=new Date();
  if(data.history[getToday()]){ s=1; d.setDate(d.getDate()-1); } else d.setDate(d.getDate()-1);
  while(true){ const k=d.toISOString().slice(0,10); if(data.history[k]>0){s++;d.setDate(d.getDate()-1);} else break; }
  return s;
}

function getLast7(){
  const r=[];
  for(let i=6;i>=0;i--){ const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10); r.push({label:d.toLocaleDateString("es",{weekday:"short"}).slice(0,2).toUpperCase(),count:data.history[k]||0,isToday:i===0}); }
  return r;
}

// Audio
function ensureAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==="suspended") audioCtx.resume(); return audioCtx; }

function playStartSound(){
  try{ const c=ensureAudio();
    [{freq:523,t:0},{freq:659,t:.12},{freq:784,t:.24}].forEach(({freq,t})=>{
      const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);
      o.frequency.value=freq;o.type="sine"; g.gain.setValueAtTime(.18,c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.01,c.currentTime+t+.3); o.start(c.currentTime+t);o.stop(c.currentTime+t+.3);
    });
  }catch(e){}
}

function playEndSound(){
  try{ const c=ensureAudio();
    [{freq:880,t:0,dur:.3},{freq:660,t:.2,dur:.3},{freq:440,t:.4,dur:.5},{freq:330,t:.7,dur:.6}].forEach(({freq,t,dur})=>{
      const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);
      o.frequency.value=freq;o.type="triangle"; g.gain.setValueAtTime(.22,c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.01,c.currentTime+t+dur); o.start(c.currentTime+t);o.stop(c.currentTime+t+dur);
    });
  }catch(e){}
}

// Render
function render(){
  const tl=state.timeLeft, dur=settings[state.mode]*60;
  document.getElementById("display").innerHTML = pad(Math.floor(tl/60))+'<span class="colon'+(state.running?" blink":"")+'">:</span>'+pad(tl%60);
  document.getElementById("progress").style.width = ((1-tl/dur)*100)+"%";
  document.getElementById("mode-label").textContent = MODES[state.mode].label;
  document.getElementById("icon-play").style.display = state.running?"none":"block";
  document.getElementById("icon-pause").style.display = state.running?"block":"none";

  const dots=document.querySelectorAll("#dots .dot");
  dots.forEach((d,i)=>{ if(i<(state.pomCount%4)){d.classList.add("filled")}else{d.classList.remove("filled")} });

  const today=getToday(), tc=data.history[today]||0, streak=calcStreak();
  document.getElementById("s-today").textContent=tc;
  document.getElementById("s-total").textContent=data.totalPomodoros;
  document.getElementById("s-streak").textContent=streak+"d";

  // Stats page
  document.getElementById("st-today").textContent=tc;
  document.getElementById("st-streak").textContent=streak+" dias";
  document.getElementById("st-total").textContent=data.totalPomodoros;
  document.getElementById("st-hours").textContent=Math.round(data.totalMinutes/6)/10+"h";

  const last7=getLast7(), max7=Math.max(...last7.map(d=>d.count),1);
  const chart=document.getElementById("chart");
  chart.innerHTML=last7.map(d=>`<div class="chart-col"><span class="chart-num" style="color:${d.count>0?"var(--gold)":"transparent"}">${d.count}</span><div class="chart-bar" style="height:${Math.max((d.count/max7)*64,4)}px;background:${d.isToday?"var(--gold)":d.count>0?"rgba(168,134,58,0.5)":"rgba(90,74,40,0.2)"};${d.isToday&&d.count>0?"box-shadow:0 0 10px var(--gold-glow)":""}"></div><span class="chart-day${d.isToday?" today":""}">${d.label}</span></div>`).join("");

  const sm=document.getElementById("streak-msg");
  if(streak>=3){sm.style.display="flex";document.getElementById("streak-text").textContent=streak+" dias seguidos enfocado. Segui asi!";}else{sm.style.display="none";}

  document.getElementById("set-work").textContent=settings.work;
  document.getElementById("set-short").textContent=settings.short;
  document.getElementById("set-long").textContent=settings.long;
}

function completeSession(){
  playEndSound(); state.running=false; clearInterval(state.interval);
  if(state.mode==="work"){
    const today=getToday(); data.history[today]=(data.history[today]||0)+1;
    data.totalPomodoros++; data.totalMinutes+=settings.work; saveStore();
    state.pomCount++;
    if(state.pomCount%4===0){state.mode="long";state.timeLeft=settings.long*60;}
    else{state.mode="short";state.timeLeft=settings.short*60;}
  }else{state.mode="work";state.timeLeft=settings.work*60;}
  updateTabs(); render();
}

function tick(){
  if(state.timeLeft<=1){completeSession();return;}
  state.timeLeft--; render();
}

function toggleRun(){
  ensureAudio();
  if(!state.running){playStartSound();state.running=true;state.interval=setInterval(tick,1000);}
  else{state.running=false;clearInterval(state.interval);}
  render();
}

function resetTimer(){state.running=false;clearInterval(state.interval);state.timeLeft=settings[state.mode]*60;render();}

function skipSession(){
  if(state.mode==="work") completeSession();
  else{state.mode="work";state.timeLeft=settings.work*60;state.running=false;clearInterval(state.interval);updateTabs();render();}
}

function switchMode(m){state.running=false;clearInterval(state.interval);state.mode=m;state.timeLeft=settings[m]*60;updateTabs();render();}

function updateTabs(){
  document.querySelectorAll(".tab").forEach(t=>{t.classList.toggle("active",t.dataset.mode===state.mode);});
}

function changeSetting(key,delta){
  settings[key]=Math.max(1,Math.min(60,settings[key]+delta));
  if(state.mode===key&&!state.running) state.timeLeft=settings[key]*60;
  render();
}

function resetAllData(){
  if(confirm("Reiniciar todos los datos?")){data={history:{},totalPomodoros:0,totalMinutes:0};saveStore();state.pomCount=0;render();}
}

function showPage(p){
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.getElementById("page-"+p).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b=>{b.classList.toggle("active",b.dataset.page===p);});
  render();
}

// Events
document.getElementById("btn-play").addEventListener("click",toggleRun);
document.getElementById("btn-reset").addEventListener("click",resetTimer);
document.getElementById("btn-skip").addEventListener("click",skipSession);
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>switchMode(t.dataset.mode)));
document.querySelectorAll(".nav-btn").forEach(b=>b.addEventListener("click",()=>showPage(b.dataset.page)));

// Init
loadStore(); render();

// Register service worker
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
</body>
</html>
